name: Maven

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify
        if: runner.os != 'Windows'
        run: ./mvnw -B verify

      - name: Verify
        if: runner.os == 'Windows'
        run: .\mvnw.cmd -B verify

      - name: Generate sample data report
        if: runner.os == 'Linux'
        run: ./mvnw -B -Dtest=SampleDataReportTest -Dschemalightener.sampleReport=true test

      - name: Prepare sample data report artifact
        if: runner.os == 'Linux'
        run: cp target/schemalightener-sample-report/index.html target/schemalightener-sample-report.html

      - name: Upload sample data report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          path: target/schemalightener-sample-report.html
          archive: false
          if-no-files-found: error
